<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KitoFusion Marketplace</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

/* header */

header{
text-align:center;
padding:60px;
font-size:40px;
letter-spacing:3px;
border-bottom:1px solid #222;
}

/* grid */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,250px);
gap:40px;
justify-content:center;
padding:60px;
}

/* cartes */

.card{
background:#111;
border:1px solid #222;
border-radius:10px;
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
border:1px solid white;
}

/* image */

.card img{
width:100%;
border-radius:8px;
}

/* titre */

.title{
font-size:20px;
margin-top:10px;
}

/* prix */

.price{
color:#bbb;
margin:10px 0;
}

/* bouton */

button{
width:100%;
padding:10px;
background:white;
border:none;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#ddd;
}

</style>
</head>

<body>

<header>
KitoFusion Marketplace
</header>

<div class="container">

<div class="card">
<img src="https://placehold.co/300x200/111/FFF">
<div class="title">Shop GUI System</div>
<div class="price">50 Robux</div>
<button>Buy</button>
</div>

<div class="card">
<img src="https://placehold.co/300x200/111/FFF">
<div class="title">Admin Panel</div>
<div class="price">100 Robux</div>
<button>Buy</button>
</div>

<div class="card">
<img src="https://placehold.co/300x200/111/FFF">
<div class="title">Double Jump Script</div>
<div class="price">30 Robux</div>
<button>Buy</button>
</div>

</div>

</body>
</html>
